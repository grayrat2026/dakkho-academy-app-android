name: dakkho_academy_app
description: "DAKKHO Academy — Online learning platform for Bangladeshi polytechnic students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

# ─────────────────────────────────────────────────────────────
# Dependencies
# ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── State Management ───
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ─── Routing ───
  go_router: ^14.6.2

  # ─── Networking ───
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ─── Data Models ───
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ─── Local Storage ───
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # ─── Platform / Device Info ───
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2
  platform_info: ^5.0.0

  # ─── Video Player ───
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6
  youtube_player_flutter: ^9.1.1

  # ─── Downloads / Encryption ───
  path_provider: ^2.1.5
  crypto: ^3.0.6
  encrypt: ^5.0.3
  background_downloader: ^8.5.7

  # ─── Push Notifications (OneSignal — NO Firebase dependency) ───
  # OneSignal Flutter SDK uses OneSignal's shared FCM project for transport.
  # No google-services.json needed. Just OneSignal App ID from web app.
  onesignal_flutter: ^5.2.0
  flutter_local_notifications: ^18.0.1

  # ─── Animations ───
  flutter_animate: ^4.5.2
  lottie: ^3.2.0
  rive: ^0.13.20

  # ─── UI / Icons ───
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.2.0+3

  # ─── Utilities ───
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1
  flutter_dotenv: ^5.2.1
  envied: ^0.5.4
  sentry_flutter: ^8.10.1
  timeago: ^3.7.0
  form_builder_validators: ^11.0.0
  image_picker: ^1.1.2

  # ─── In-App Purchase (PipraPay via custom implementation) ───
  # We're using PipraPay directly via Dio — no in_app_purchase needed.
  # If we add Google Play Billing later, uncomment:
  # in_app_purchase: ^3.2.0

# ─────────────────────────────────────────────────────────────
# Dev Dependencies
# ─────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generators
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  envied_generator: ^0.5.4

  # Launcher icons + splash
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

# ─────────────────────────────────────────────────────────────
# Flutter Configuration
# ─────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  generate: true  # For localizations

  assets:
    - .env
    - .env.dev
    - .env.staging
    - .env.prod
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700


# ─────────────────────────────────────────────────────────────
# Flutter Launcher Icons
# ─────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/ic_launcher-playstore-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0f172a"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icons/ic_notification.png"

# ─────────────────────────────────────────────────────────────
# Flutter Native Splash
# ─────────────────────────────────────────────────────────────
flutter_native_splash:
  android: true
  ios: false
  color: "#0f172a"
  image: "assets/icons/splash-icon.png"
  android_12:
    image: "assets/icons/splash-icon.png"
    color: "#0f172a"
    icon_background_color: "#0f172a"
