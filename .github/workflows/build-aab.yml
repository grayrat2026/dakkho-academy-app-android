name: Build AAB (Play Store)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build prod AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Build AAB
        run: |
          flutter build appbundle \
            --flavor prod \
            --release \
            --dart-define-from-file=.env.prod

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: dakkho-prod-aab
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30

      - name: Print AAB info
        run: |
          echo "=== AAB Build Complete ==="
          ls -lh build/app/outputs/bundle/prodRelease/
          echo ""
          echo "Upload app-prod-release.aab to Google Play Console"
